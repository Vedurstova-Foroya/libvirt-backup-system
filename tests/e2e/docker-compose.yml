services:
  runner:
    build:
      context: ../..
      dockerfile: tests/e2e/runner/Dockerfile
    environment:
      PATH: /src/tests/e2e/fakes:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PYTHONPATH: /src
      PYTHONWARNINGS: error
    volumes:
      - backup-data:/mnt/qnap-backups

volumes:
  backup-data:
